<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NDF Booking Screen — Prototype</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f7; color: #1d1d1f; font-size: 14px; line-height: 1.5; }
  .page { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* Banner */
  .banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #856404; margin-bottom: 16px; }

  /* Breadcrumb */
  .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 14px; }
  .breadcrumb .back { font-weight: 600; color: #1d1d1f; text-decoration: none; }
  .breadcrumb .product { font-weight: 700; }
  .badge { background: #e8e8ed; color: #6e6e73; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Layout */
  .layout { display: grid; grid-template-columns: 1fr 280px; gap: 24px; align-items: start; }

  /* Card */
  .card { background: #fff; border: 1px solid #d2d2d7; border-radius: 12px; margin-bottom: 20px; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid #e8e8ed; font-size: 12px; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-body { padding: 16px; }

  /* Form elements */
  .field-label { font-size: 11px; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .field-label .info { width: 12px; height: 12px; border: 1.5px solid #86868b; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-style: italic; color: #86868b; }
  select, input[type="text"], input[type="date"] { width: 100%; height: 32px; border: 1px solid #d2d2d7; border-radius: 6px; padding: 0 10px; font-size: 13px; color: #1d1d1f; background: #fff; outline: none; transition: border-color 0.15s; }
  select:focus, input:focus { border-color: #0071e3; }
  select:disabled, input:disabled { background: #f5f5f7; color: #86868b; cursor: not-allowed; }
  .hint { font-size: 12px; color: #86868b; margin-top: 2px; font-style: italic; }

  /* Grid helpers */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .stack { display: flex; flex-direction: column; }
  .gap-4 { gap: 4px; }
  .gap-14 { gap: 14px; }
  .row { display: flex; align-items: center; gap: 8px; }

  /* Toggle BUY/SELL */
  .side-toggle { display: flex; gap: 0; }
  .side-btn { padding: 4px 14px; font-size: 12px; font-weight: 600; border: 1px solid #d2d2d7; cursor: pointer; transition: all 0.15s; background: #fff; color: #6e6e73; }
  .side-btn:first-child { border-radius: 6px 0 0 6px; }
  .side-btn:last-child { border-radius: 0 6px 6px 0; border-left: none; }
  .side-btn.buy-active { background: #34c759; color: #fff; border-color: #34c759; }
  .side-btn.sell-active { background: #ff3b30; color: #fff; border-color: #ff3b30; }

  /* Trade row */
  .trade-row { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
  .trade-row .vs { color: #86868b; padding-bottom: 6px; font-size: 13px; }

  /* Divider */
  .divider { border: none; border-top: 1px solid #e8e8ed; margin: 4px 0; }

  /* Preview box */
  .preview-box { background: #f5f5f7; border-radius: 6px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; }
  .pill-green { background: #d1f2d9; color: #0a7c2e; }
  .pill-red { background: #fdd; color: #c00; }
  .preview-meta { font-size: 12px; color: #86868b; margin-left: auto; }

  /* Details box */
  .details-box { border: 1px solid #d2d2d7; border-radius: 6px; padding: 12px 14px; background: #fafafa; }
  .details-title { font-size: 12px; font-weight: 600; color: #86868b; margin-bottom: 8px; }

  /* Footer */
  .footer { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
  .validation { background: #fdd; border: 1px solid #f5c6cb; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #c00; }
  .validation strong { font-weight: 700; }
  .footer-spacer { flex: 1; }
  .btn { height: 30px; padding: 0 16px; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-ghost { background: transparent; color: #6e6e73; }
  .btn-ghost:hover { background: #f0f0f0; }
  .btn-secondary { background: #e8e8ed; color: #1d1d1f; }
  .btn-secondary:hover { background: #d2d2d7; }
  .btn-primary { background: #5e5ce6; color: #fff; }
  .btn-primary:hover { background: #4a48c4; }
  .btn-primary:disabled { background: #b0b0c0; cursor: not-allowed; }

  /* Summary */
  .summary-card { position: sticky; top: 24px; }
  .summary-row { display: flex; justify-content: space-between; padding: 3px 0; }
  .summary-label { font-size: 12px; color: #86868b; }
  .summary-value { font-size: 13px; font-weight: 600; color: #1d1d1f; }
  .summary-label-sm { font-size: 12px; color: #aeaeb2; }
  .summary-value-sm { font-size: 12px; color: #aeaeb2; }

  .section-label { font-size: 12px; font-weight: 600; color: #86868b; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .trade-row { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
